spring:
  application:
    name: car-rental-service

  datasource:
    url: jdbc:postgresql://localhost:5432/car_rental_db?options=-c%20timezone=UTC
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
jwt:
  secret: 4d5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c4d5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c
  expiration: 86400000

app:
  otp:
    expiration-time-ms: ${OTP_EXPIRATION_TIME_MS:300000}
    expiration-time-minutes: 5
    max-verification-attempts: ${OTP_MAX_VERIFICATION_ATTEMPTS:3}
    max-generation-attempts: ${OTP_MAX_GENERATION_ATTEMPTS:5}

server:
  port: 8080
